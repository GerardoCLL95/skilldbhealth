name: Database Health Check

on:
  schedule:
    # Runs every 6 hours (at 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manual triggering of the check

jobs:
  check-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check DB Health Metrics
        env:
          DB_HEALTH_TOKEN: ${{ secrets.DB_HEALTH_TOKEN }}
        run: |
          python -c '
          import urllib.request
          import json
          import os
          import sys

          token = os.environ.get("DB_HEALTH_TOKEN")
          if not token:
              print("Error: DB_HEALTH_TOKEN secret is not configured in the repository.")
              sys.exit(1)

          url = "http://38.250.116.71:5000/api/datasources"
          req = urllib.request.Request(url)
          req.add_header("Authorization", f"Bearer {token}")

          try:
              with urllib.request.urlopen(req, timeout=15) as response:
                  if response.status != 200:
                      print(f"Error: API returned status code {response.status}")
                      sys.exit(1)
                  data = json.loads(response.read().decode())
                  
                  unhealthy_dbs = []
                  print("Database Health Status:")
                  for db in data:
                      name = db.get("nombre", "Unknown")
                      status = db.get("status", "UNKNOWN")
                      is_active = db.get("activa", True)
                      print(f" - {name}: {status} (Active: {is_active})")
                      if is_active and status != "OK":
                          unhealthy_dbs.append(db)
                  
                  if unhealthy_dbs:
                      print(f"\nError: Found {len(unhealthy_dbs)} unhealthy database(s)!")
                      for db in unhealthy_dbs:
                          print(f"  * {db.get(\"nombre\")} has status {db.get(\"status\")}")
                      sys.exit(1)
                  else:
                      print("\nAll active databases are healthy (OK).")
                      sys.exit(0)
          except Exception as e:
              print(f"Error connecting to database health API: {e}")
              sys.exit(1)
          '
