name: Database Health Check

on:
  push:
    branches: [ "main" ]
  schedule:
    # Runs every 6 hours (at 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manual triggering of the check

jobs:
  check-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check DB Health Metrics
        env:
          DB_HEALTH_TOKEN: ${{ secrets.DB_HEALTH_TOKEN }}
        run: |
          python .github/scripts/check_health.py
